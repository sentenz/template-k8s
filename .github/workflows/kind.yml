# SPDX-License-Identifier: Apache-2.0

name: Kind

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/kind.yml"
      - "charts/**"
      - "config/**"
      - "manifests/**"
      - "Makefile"
      - "scripts/bootstrap.sh"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/kind.yml"
      - "charts/**"
      - "config/**"
      - "manifests/**"
      - "Makefile"
      - "scripts/bootstrap.sh"
  workflow_dispatch:

concurrency:
  group: kind-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  KUSTOMIZE_PATH: manifests/overlays/dev/dependency-track

jobs:
  kind-deployment:
    name: Kind Deployment
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      KUBECONFIG: ${{ runner.temp }}/kubeconfig.yaml
      RENDERED_MANIFEST: ${{ runner.temp }}/rendered.yaml
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set Up Helm
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v4.2.0
          token: ""

      - name: Verify Build Toolchain
        run: |
          set -euo pipefail
          helm version --short
          openssl version

      - name: Generate Ephemeral TLS Certificate
        run: |
          set -euo pipefail
          certificate_directory="${KUSTOMIZE_PATH}"

          openssl req \
            -x509 \
            -nodes \
            -newkey rsa:2048 \
            -days 1 \
            -keyout "${certificate_directory}/dependency-track.localhost+1-key.pem" \
            -out "${certificate_directory}/dependency-track.localhost+1.pem" \
            -subj "/CN=dependency-track.localhost" \
            -addext "subjectAltName=DNS:dependency-track.localhost"

      - name: Create Kind Cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: v0.32.0
          node_image: kindest/node:v1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5
          kubectl_version: v1.36.1
          config: config/kind-config.yaml
          kubeconfig: ${{ runner.temp }}/kubeconfig.yaml
          cluster_name: template-k8s
          wait: 5m

      - name: Verify Cluster Prerequisites
        run: |
          set -euo pipefail

          kind version
          kubectl version --output=yaml
          kubectl wait --for=condition=Ready node --all --timeout=5m

          node_count="$(kubectl get nodes --no-headers | wc -l | tr -d ' ')"
          control_plane_count="$(
            kubectl get nodes \
              --selector='node-role.kubernetes.io/control-plane' \
              --no-headers | wc -l | tr -d ' '
          )"
          worker_count="$(
            kubectl get nodes \
              --selector='!node-role.kubernetes.io/control-plane' \
              --no-headers | wc -l | tr -d ' '
          )"

          if [[ "${node_count}" != "3" || "${control_plane_count}" != "1" || "${worker_count}" != "2" ]]; then
            echo "Unexpected Kind topology: nodes=${node_count}, control-planes=${control_plane_count}, workers=${worker_count}" >&2
            kubectl get nodes --show-labels >&2
            exit 1
          fi

          kubectl get nodes -o wide
          kubectl get storageclass local-path

      - name: Render and Validate Manifests
        run: |
          set -euo pipefail

          kubectl kustomize "${KUSTOMIZE_PATH}" \
            --enable-helm \
            --load-restrictor=LoadRestrictionsNone \
            > "${RENDERED_MANIFEST}"

          test -s "${RENDERED_MANIFEST}"
          kubectl apply \
            --dry-run=client \
            --validate=strict \
            -f "${RENDERED_MANIFEST}"

      - name: Deploy Manifests
        run: |
          set -euo pipefail
          kubectl apply -f "${RENDERED_MANIFEST}"

      - name: Wait for Workloads
        run: |
          set -euo pipefail

          wait_for_rollouts() {
            local namespace="$1"
            local timeout="$2"
            local workloads=()

            mapfile -t workloads < <(
              kubectl get deployment,statefulset,daemonset \
                --namespace "${namespace}" \
                --output name
            )

            if (( ${#workloads[@]} == 0 )); then
              echo "No rollout-managed workloads found in namespace ${namespace}" >&2
              return 1
            fi

            for workload in "${workloads[@]}"; do
              kubectl rollout status \
                --namespace "${namespace}" \
                "${workload}" \
                --timeout "${timeout}"
            done
          }

          wait_for_jobs() {
            local namespace="$1"
            local timeout="$2"
            local jobs=()

            mapfile -t jobs < <(
              kubectl get jobs \
                --namespace "${namespace}" \
                --output name
            )

            for job in "${jobs[@]}"; do
              kubectl wait \
                --namespace "${namespace}" \
                --for=condition=Complete \
                "${job}" \
                --timeout "${timeout}"
            done
          }

          wait_for_rollouts postgresql 15m
          wait_for_rollouts traefik 10m
          wait_for_rollouts dependency-track 20m

          wait_for_jobs postgresql 10m
          wait_for_jobs traefik 10m
          wait_for_jobs dependency-track 10m

          for namespace in postgresql traefik dependency-track; do
            kubectl wait --for=condition=Ready pod --all \
              --namespace "${namespace}" \
              --timeout=5m
          done

          kubectl wait \
            --for=jsonpath='{.status.phase}'=Bound \
            persistentvolumeclaim \
            --all \
            --namespace postgresql \
            --timeout=5m

      - name: Test Ingress Endpoints
        run: |
          set -euo pipefail

          curl_options=(
            --cacert "${KUSTOMIZE_PATH}/dependency-track.localhost+1.pem"
            --connect-timeout 5
            --fail-with-body
            --location
            --max-time 30
            --noproxy "*"
            --retry 30
            --retry-all-errors
            --retry-delay 10
            --retry-max-time 300
            --show-error
            --silent
            --resolve dependency-track.localhost:443:127.0.0.1
          )

          curl "${curl_options[@]}" \
            https://dependency-track.localhost/health

          curl "${curl_options[@]}" \
            --output /dev/null \
            https://dependency-track.localhost/

      - name: Publish Deployment Summary
        if: success()
        run: |
          set -euo pipefail
          {
            echo "## Kind deployment test"
            echo
            echo "### Toolchain"
            echo
            echo '```text'
            kind version
            kubectl version
            helm version --short
            echo '```'
            echo
            echo "### Resources"
            echo
            echo '```text'
            kubectl get deployments,statefulsets,daemonsets,jobs,pods,services,ingress \
              --all-namespaces \
              -o wide
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Collect Failure Diagnostics
        if: failure()
        run: |
          set +e
          diagnostics_directory="${RUNNER_TEMP}/kind-diagnostics"
          mkdir -p "${diagnostics_directory}/logs"

          timeout 5m kind export logs \
            "${diagnostics_directory}/kind" \
            --name template-k8s || true

          kubectl get nodes -o wide \
            > "${diagnostics_directory}/nodes.txt" 2>&1
          kubectl get all,ingress,persistentvolumeclaim --all-namespaces -o wide \
            > "${diagnostics_directory}/resources.txt" 2>&1
          kubectl get persistentvolume,storageclass -o wide \
            > "${diagnostics_directory}/storage.txt" 2>&1
          kubectl get events --all-namespaces --sort-by=.metadata.creationTimestamp \
            > "${diagnostics_directory}/events.txt" 2>&1
          kubectl describe pods --all-namespaces \
            > "${diagnostics_directory}/pods.txt" 2>&1
          kubectl describe deployments,statefulsets,daemonsets,jobs,services,ingresses,persistentvolumeclaims \
            --all-namespaces \
            > "${diagnostics_directory}/workloads.txt" 2>&1

          while read -r namespace pod; do
            kubectl logs \
              --namespace "${namespace}" \
              "${pod}" \
              --all-containers=true \
              --prefix=true \
              --tail=200 \
              > "${diagnostics_directory}/logs/${namespace}-${pod}.log" 2>&1 || true

            kubectl logs \
              --namespace "${namespace}" \
              "${pod}" \
              --all-containers=true \
              --prefix=true \
              --previous \
              --tail=200 \
              > "${diagnostics_directory}/logs/${namespace}-${pod}-previous.log" 2>&1 || true
          done < <(
            kubectl get pods --all-namespaces \
              -o jsonpath='{range .items[*]}{.metadata.namespace}{" "}{.metadata.name}{"\n"}{end}'
          )

      - name: Upload Failure Diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kind-deployment-diagnostics
          path: ${{ runner.temp }}/kind-diagnostics
          if-no-files-found: ignore
          retention-days: 7

      - name: Remove Ephemeral Credentials
        if: always()
        run: |
          rm -f \
            "${KUBECONFIG}" \
            "${RENDERED_MANIFEST}" \
            "${KUSTOMIZE_PATH}/dependency-track.localhost+1.pem" \
            "${KUSTOMIZE_PATH}/dependency-track.localhost+1-key.pem"
