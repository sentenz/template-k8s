# SPDX-License-Identifier: Apache-2.0

name: Renovate

on:
  workflow_dispatch:
  schedule:
    # Run weekly on Sundays at 4:00 AM UTC
    - cron: "0 4 * * 0"

jobs:
  renovate:
    name: Renovate Action
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      checks: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Renovate
        uses: sentenz/actions/renovate@bceed480720a7bc304e974cd655ebe42ac41d5e2 # 1.1.9
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          autodiscover: "true"
          log-level: "info"
