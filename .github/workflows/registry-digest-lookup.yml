# SPDX-License-Identifier: Apache-2.0

name: Apply Kind Makefile Migration

on:
  push:
    branches:
      - agent/containerize-kind-make-targets
    paths:
      - .github/workflows/registry-digest-lookup.yml

permissions:
  contents: write

jobs:
  apply:
    name: Update and validate Makefile
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Replace host kind invocations
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("Makefile")
          content = path.read_text()

          variables_old = """KIND_CLUSTER_NAME ?= template-k8s
          KIND_CONFIG ?= config/kind-cluster.yaml
          """
          variables_new = """KIND_CLUSTER_NAME ?= template-k8s
          KIND_CONFIG ?= config/kind-cluster.yaml
          KIND_IMAGE ?= ghcr.io/sentenz/kind:v0.32.0@sha256:fe11a5f85fed99bd46b0dcb6c1acf86ebee86e2409c6f88a6680e1ee0e74b80c
          """

          setup_old = """\t@kind create cluster \\
          \t\t--name \"$(KIND_CLUSTER_NAME)\" \\
          \t\t--config \"$(KIND_CONFIG)\" \\
          \t\t--kubeconfig \"$(K8S_KUBECONFIG)\" \\
          \t\t--wait 5m
          """
          setup_new = """\t@docker run --rm \\
          \t\t--network host \\
          \t\t--volume /var/run/docker.sock:/var/run/docker.sock \\
          \t\t--volume \"$(CURDIR):/workspace\" \\
          \t\t--workdir /workspace \\
          \t\t\"$(KIND_IMAGE)\" \\
          \t\tcreate cluster \\
          \t\t--name \"$(KIND_CLUSTER_NAME)\" \\
          \t\t--config \"$(KIND_CONFIG)\" \\
          \t\t--kubeconfig \"$(K8S_KUBECONFIG)\" \\
          \t\t--wait 5m
          """

          teardown_old = """\t@kind delete cluster --name \"$(KIND_CLUSTER_NAME)\"
          """
          teardown_new = """\t@docker run --rm \\
          \t\t--network host \\
          \t\t--volume /var/run/docker.sock:/var/run/docker.sock \\
          \t\t\"$(KIND_IMAGE)\" \\
          \t\tdelete cluster \\
          \t\t--name \"$(KIND_CLUSTER_NAME)\"
          """

          replacements = (
              (variables_old, variables_new, "kind image variable"),
              (setup_old, setup_new, "k8s-setup recipe"),
              (teardown_old, teardown_new, "k8s-teardown recipe"),
          )
          for old, new, label in replacements:
              count = content.count(old)
              if count != 1:
                  raise SystemExit(f"Expected exactly one {label}; found {count}")
              content = content.replace(old, new, 1)

          path.write_text(content)
          PY

      - name: Validate Makefile
        shell: bash
        run: |
          set -euo pipefail
          make --no-print-directory --dry-run k8s-setup
          make --no-print-directory --dry-run k8s-teardown
          grep -F 'KIND_IMAGE ?= ghcr.io/sentenz/kind:v0.32.0@sha256:fe11a5f85fed99bd46b0dcb6c1acf86ebee86e2409c6f88a6680e1ee0e74b80c' Makefile
          if grep -nE '^[[:space:]]*@?kind (create|delete) cluster' Makefile; then
            echo 'Direct host kind invocation remains in Makefile' >&2
            exit 1
          fi

      - name: Remove temporary lookup files and publish change
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .github/registry-digest-lookup.md \
            .github/registry-digest-result.txt \
            .github/workflows/registry-digest-lookup.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "build(kind): run Make targets through pinned CLI image"
          git push
