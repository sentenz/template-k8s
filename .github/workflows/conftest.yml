# SPDX-License-Identifier: Apache-2.0

name: Conftest

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  conftest:
    name: Conftest Action
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Conftest
        uses: sentenz/actions/conftest@3fb44ff384819e1eb88fc1c661ec3d04b6d930c0 # 1.1.7
        with:
          policy-path: "./tests/policy"
