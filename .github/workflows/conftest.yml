# SPDX-License-Identifier: Apache-2.0

name: Conftest

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  conftest:
    name: Conftest Action
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Conftest
        uses: sentenz/actions/conftest@1491eeb075bc01903aee09bb3e43bffccf9e6662 # 1.1.4
        with:
          policy-path: "./tests/policy"
