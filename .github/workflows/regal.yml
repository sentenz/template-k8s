# SPDX-License-Identifier: Apache-2.0

name: Regal

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  regal:
    name: Regal Action
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Regal
        uses: sentenz/actions/regal@de1f3edb8a4562d89b6f8d48e93ce64caa653230 # 1.1.5
        with:
          path: "./tests/policy"
          regal-version: "latest"
