---
apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: traefik
spec:
  type: NodePort
  ports:
    - name: web
      port: 80
      protocol: TCP
      targetPort: web
      nodePort: 30080
    - name: websecure
      port: 443
      protocol: TCP
      targetPort: websecure
      nodePort: 30443
